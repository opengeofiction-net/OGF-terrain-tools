# OGF-specific overrides for config/locales/en.yml
#
# Keys are dot-separated YAML paths matching the structure of en.yml.
# Values replace the entire upstream value after automated substitutions
# have been applied. Use these for strings that need rewording for OGF
# context, not just token substitution.
#
# Block scalars (|) must be indented with two spaces beneath the key.
# Inline values follow the key directly: key: value

# "community_driven_1_html" describes who contributes to the project.
# Removed "humanitarians mapping disaster-affected areas" (no meaning
# in a fictional world) and "GIS professionals" (less relevant to OGF).
en.site.about_section.community_driven_1_html: |
  OpenGeofiction's community is diverse, passionate, and growing every day.
  Our contributors include enthusiast mappers, worldbuilders, cartographers,
  engineers running the OGF servers, and many more.
  To learn more about the community, see the %{osm_blog_link},
  %{user_diaries_link}, %{community_blogs_link}, and the
  %{osm_foundation_link} website.
